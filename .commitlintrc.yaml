extends:
  - "@commitlint/config-conventional"
rules:
  type-enum:
    - 2
    - always
    - - feat
      - fix
      - docs
      - style
      - refactor
      - perf
      - test
      - build
      - ci
      - chore
      - revert
  subject-case:
    - 2
    - never
    - - sentence-case
      - start-case
      - pascal-case
      - upper-case
  header-max-length:
    - 2
    - always
    - 100
  # Disabled: Dependabot and other automated PRs put long URLs (release
  # notes, compare links) in commit bodies. The 100-char cap is appropriate
  # for human-written prose but not for embedded references.
  body-max-line-length:
    - 0
  footer-max-line-length:
    - 0
