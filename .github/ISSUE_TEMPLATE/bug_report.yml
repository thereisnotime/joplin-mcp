name: Bug Report
description: Report a bug in joplin-mcp
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the fields below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Configure ...
        2. Call tool ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen instead.
    validations:
      required: true

  - type: input
    id: joplin-mcp-version
    attributes:
      label: joplin-mcp Version
      description: Output of `joplin-mcp --version`.
      placeholder: "v0.1.0"
    validations:
      required: true

  - type: input
    id: joplin-version
    attributes:
      label: Joplin Desktop Version
      description: Joplin Desktop version (Help → About).
      placeholder: "3.4.x"
    validations:
      required: true

  - type: input
    id: mcp-client
    attributes:
      label: MCP Client
      description: Which MCP client (Claude Desktop, Cursor, etc.) and version.
      placeholder: "Claude Desktop 1.x"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "macOS 15.x / Ubuntu 24.04 / Windows 11"
    validations:
      required: true
